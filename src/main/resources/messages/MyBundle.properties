prompts.intention=As an expert software engineer, explain the provided code. \n\n{0}\n\nHere are used imports of the provided method: \n{1}
prompts.references=Generate two reference versions that follow the same intention as the previously provided version but solve the problem in their own way. \n\
  Conditions: \n\
  1. The method signature should stay the same. The method should be named like the original method. \n\
  2. You should just generate a method, not a class! \n\
  3. Make use of exising API's like the ones in the provided version. If you use new API's, provide the imports. If any imports are missing for used classes, assume they are accessible package private. \n\
  4. Just send the reference versions.
prompts.diverseInput=Generate diverse test input for the first program.
prompts.testReferences=Write a complete test class that tests the references with the provided test input. \n\
  Conditions:\n\
  1. The class should be named {0}ReferenceTestClass \n\
  2. The class should contain a main method. \n\
  3. The references are being provided via the classes {0}1 {0}2 and are not needed again for this test class. \n\
  4. It should print whether a test case matched between both references, was different between the references or an error occurred in one of them. Do that with a try and catch. \n\
  5. The result should also be printed in the console. \n\
  6. Send just the TestClass without explanation or anything else.
prompts.testPut=Here are the test results of the previous test class: \n\n {0} \n\n Write a new test class. \n\
  Conditions: \n\
  1. The class should be named {1}TestClass. \n\
  2. Use all the test cases that matched in the previous test. \n\
  3. Test only the original method, which is accessible under the class {2}. \n\
  4. If a result does not match the expected output, exit with error code 3.
prompt.verify=Verify the test class and check if everything is correct. \n\
  Things to check and consider: \n\
  1. Check if all previous matching test cases are used. \n\
  2. Check if the expected outputs are the same as in the previous test cases. \n\
  3. Check if the imports are correct. \n\
  4. Send just the verified test class. \n\
  5. Check additional things you come up with.
